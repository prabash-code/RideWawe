spring:
  application:
    name: SpringSecEx

  datasource:
    url: jdbc:mysql://localhost:3306/ride_wawe?createDatabaseIfNotExist=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret:
  expiration: 3600000

logging:
  level:
    io.jsonwebtoken: DEBUG

  spring:
    servlet:
      multipart:
        max-file-size: 10MB
        max-request-size: 10MB

